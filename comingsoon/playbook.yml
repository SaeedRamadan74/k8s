---
- name: "Build container with ansible"
  hosts: localhost
  tasks:
    - name: stop running container
      command: docker stop comingsoon-page
      ignore_errors: yes

    - name: remove stopped container
      command: docker rm comingsoon-page
      ignore_errors: yes

    - name: remove used image
      command: docker rmi saeedamadan74/comming-soon-k8s
      ignore_errors: yes

    - name: build docker image from dockerfile
      command: docker build -t saeedamadan74/comming-soon-k8s .

    - name: push image to dockerhub
      command: docker push saeedamadan74/comming-soon-k8s
